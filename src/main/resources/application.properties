# ===============================
# APPLICATION PROPERTIES MEJORADO
# ===============================

spring.application.name=SisPlus

# ===============================
# DATABASE CONFIG - POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# CACHE CONFIGURATION
# ===============================
# Opciones: caffeine (desarrollo), redis (producciˇn)
spring.cache.type=caffeine

# Solo si usas Redis (comentar si usas Caffeine):
# spring.cache.type=redis
# spring.redis.host=localhost
# spring.redis.port=6379
# spring.redis.password=
# spring.redis.timeout=2000ms

# ===============================
# LOGGING - NO EXPONER INFO SENSIBLE
# ===============================
logging.level.root=INFO
logging.level.com.optical.net.sisplus=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
# IMPORTANTE: Nunca mostrar stack traces en producciˇn
spring.web.error.include-stacktrace=never
spring.web.error.include-message=always

# ===============================
# SECURITY
# ===============================
spring.security.user.password=jeansama

# ===============================
# PERFORMANCE
# ===============================
# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# ASYNC CONFIGURATION
# ===============================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# ===============================
# PROFILE ACTIVO
# ===============================
spring.profiles.active=dev